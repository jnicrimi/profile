[tools]
pnpm = "11.8.0"
node = "24.18.0"
actionlint = "1.7.12"
zizmor = "1.26.1"
gitleaks = "8.30.1"
lefthook = "2.1.9"

[tasks.setup]
description = "環境基盤を最新化"
run = ["mise install", "lefthook install", "pnpm install --frozen-lockfile"]

[tasks.yamllint]
description = "YAML を検証"
raw_args = true
run = "uvx --python-preference only-managed yamllint==1.38.0"

[tasks.dev]
description = "開発サーバを起動"
run = "trap 'exit 0' INT TERM; pnpm exec astro dev"

[tasks.build]
description = "ビルドを実行"
run = "pnpm build"

[tasks.preview]
description = "プレビューを実行"
run = "trap 'exit 0' INT TERM; pnpm exec astro preview"

[tasks.deploy]
description = "デプロイ"
run = "pnpm run deploy"

[tasks.lint]
description = "Lint・整形の確認"
run = "pnpm lint"

[tasks.fix]
description = "Lint・整形の修正"
run = "pnpm fix"

[tasks.typecheck]
description = "型チェックを実行"
run = "pnpm typecheck"

[tasks.knip]
description = "未使用コードを検出"
run = "pnpm exec knip"

[tasks.astro]
description = "Astro CLI を実行"
raw_args = true
run = "pnpm astro"
